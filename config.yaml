target: 8.8.8.8
ping_interval_sec: 1
trace_interval_sec: 30
healthy_trace_interval_sec: 300
required_successes: 5
verify_delay_sec: 5
web_port: 8080
data_dir: data
text_log_file: data/ConnectWatch.log
retention_days: 365
speedtest_download_url: https://speed.cloudflare.com/__down
speedtest_download_bytes: 10000000
speedtest_upload_url: https://speed.cloudflare.com/__up
speedtest_upload_bytes: 5000000
speedtest_interval_min: 60
auto_check_updates: true
update_manifest_url: https://raw.githubusercontent.com/mdkeenan/ConnectWatch/main/update-manifest.json
bug_report_url: https://reports.swift-raven.org/connectwatch/bug
auto_send_crash_reports: false
run_at_startup: true
